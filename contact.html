<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Contact page</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>

    <body>
        <main>
            <header>
                <nav class="nav-header">
                    <img class="logo" src="images/logo.png" alt="My Website Logo">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <section>
                <h1>Contact Us</h1>

                <p>If you have any questions or inquiries, please feel free to reach out to us using the form below. We will get back to you as soon as possible.</p>
            </section>

            <section> 
                <div class="form">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" autocomplete="name">
                </div>
                
                <div class="form">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" autocomplete="email">
                </div>

                <div class="form">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" cols="50"></textarea>
                </div>

                <div class="form">
                    <button type="submit" class="form-actions">Submit</button>
                </div>
                
            </section>

            <footer>
                <nav class="nav-footer">
                    <p>Kervin Gamueda</p>
                    <ul>
                        <li><a href="#">Instagram</a></li>
                        <li><a href="#">Twitter</a></li>
                    </ul>
                </nav>
            </footer>
        </main>
    </body>
